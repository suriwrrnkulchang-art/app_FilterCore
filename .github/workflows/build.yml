name: Build Python to EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Build EXE files
      shell: powershell
      run: |
        # ------------------------------------------------------------------
        # 🟢 ตั้งค่าชื่อไฟล์ .py ที่ต้องการสร้างเป็น EXE ตัวที่ 1 และตัวที่ 2 ที่นี่
        # ------------------------------------------------------------------
        $pyFile1 = "Setup_Program-My-THAI"  # <-- เปลี่ยนเป็นชื่อไฟล์ Py ที่ 1 ใน GitHub ของคุณ
        $pyFile2 = "uninstall_Program"  # <-- เปลี่ยนเป็นชื่อไฟล์ Py ที่ 2 ใน GitHub ของคุณ
        
        # ค้นหาไฟล์ .ico ไฟล์แรกในโฟลเดอร์อัตโนมัติ (ถ้าไม่มีจะข้ามการใส่ไอคอนให้ไม่พัง)
        $icoFile = (Get-ChildItem -Filter *.ico | Select-Object -First 1).Name
        
        print "--- กำลังสร้าง EXE ตัวที่ 1 ---"
        if ($icoFile) {
            pyinstaller --onefile --name="Setup_Myapp.FilterCore" --icon="$icoFile" "$pyFile1"
        } else {
            pyinstaller --onefile --name="Setup_Myapp.FilterCore" "$pyFile1"
        }

        print "--- กำลังสร้าง EXE ตัวที่ 2 ---"
        if ($icoFile) {
            pyinstaller --onefile --name="Setup_Myapp.SecondApp" --icon="$icoFile" "$pyFile2"
        } else {
            pyinstaller --onefile --name="Setup_Myapp.SecondApp" "$pyFile2"
        }

    - name: Upload EXE Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: My-Executable-Programs
        path: dist/*.exe
