name: Build Python to EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      py_file_1:
        description: 'Path to .py file #1 (leave empty = auto-detect first .py found)'
        required: false
        default: ''
      py_file_2:
        description: 'Path to .py file #2 (leave empty = skip this build)'
        required: false
        default: ''
      exe_name_1:
        description: 'EXE name #1'
        required: false
        default: 'Setup_Myapp.FilterCore'
      exe_name_2:
        description: 'EXE name #2'
        required: false
        default: 'Setup_Myapp.Launcher'

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Build EXE file 1
      shell: powershell
      env:
        PY_FILE_1: ${{ github.event.inputs.py_file_1 }}
        EXE_NAME_1: ${{ github.event.inputs.exe_name_1 }}
      run: |
        $pyFile = $env:PY_FILE_1
        if ([string]::IsNullOrWhiteSpace($pyFile)) {
            $pyFile = (Get-ChildItem -Filter *.py | Select-Object -First 1).Name
        }
        if ([string]::IsNullOrWhiteSpace($pyFile) -or -not (Test-Path $pyFile)) {
            Write-Error "ERROR: .py file for EXE #1 not found (input was: '$($env:PY_FILE_1)')"
            exit 1
        }

        $exeName = $env:EXE_NAME_1
        if ([string]::IsNullOrWhiteSpace($exeName)) { $exeName = "Setup_Myapp.FilterCore" }

        $icoFile = (Get-ChildItem -Filter *.ico | Select-Object -First 1).Name

        Write-Host "Building EXE 1 -> py: $pyFile | name: $exeName"

        if ($icoFile) {
            pyinstaller --onefile --name="$exeName" --icon="$icoFile" "$pyFile"
        } else {
            pyinstaller --onefile --name="$exeName" "$pyFile"
        }

        if ($LASTEXITCODE -ne 0) {
            Write-Error "ERROR: PyInstaller build failed for file #1"
            exit 1
        }

    - name: Build EXE file 2
      shell: powershell
      env:
        PY_FILE_2: ${{ github.event.inputs.py_file_2 }}
        EXE_NAME_2: ${{ github.event.inputs.exe_name_2 }}
      run: |
        $pyFile2 = $env:PY_FILE_2

        if ([string]::IsNullOrWhiteSpace($pyFile2)) {
            Write-Host "No .py file #2 specified -> skipping this build"
            exit 0
        }

        if (-not (Test-Path $pyFile2)) {
            Write-Error "ERROR: .py file for EXE #2 not found at path: '$pyFile2'"
            exit 1
        }

        $exeName2 = $env:EXE_NAME_2
        if ([string]::IsNullOrWhiteSpace($exeName2)) { $exeName2 = "Setup_Myapp.Launcher" }

        $icoFile = (Get-ChildItem -Filter *.ico | Select-Object -First 1).Name

        Write-Host "Building EXE 2 -> py: $pyFile2 | name: $exeName2"

        if ($icoFile) {
            pyinstaller --onefile --name="$exeName2" --icon="$icoFile" "$pyFile2"
        } else {
            pyinstaller --onefile --name="$exeName2" "$pyFile2"
        }

        if ($LASTEXITCODE -ne 0) {
            Write-Error "ERROR: PyInstaller build failed for file #2"
            exit 1
        }

    - name: Upload EXE Artifact 1
      uses: actions/upload-artifact@v4
      with:
        name: My-Executable-Program-1
        path: dist/${{ github.event.inputs.exe_name_1 || 'Setup_Myapp.FilterCore' }}.exe
        if-no-files-found: warn

    - name: Upload EXE Artifact 2
      uses: actions/upload-artifact@v4
      with:
        name: My-Executable-Program-2
        path: dist/${{ github.event.inputs.exe_name_2 || 'Setup_Myapp.Launcher' }}.exe
        if-no-files-found: warn
