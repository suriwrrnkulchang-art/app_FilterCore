name: Build Python to EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Build EXE file
      shell: powershell
      run: |
        # ค้นหาไฟล์ .py ไฟล์แรกในโฟลเดอร์อัตโนมัติ
        $pyFile = (Get-ChildItem -Filter *.py | Select-Object -First 1).Name
        
        # ค้นหาไฟล์ .ico ไฟล์แรกในโฟลเดอร์อัตโนมัติ (ถ้าไม่มีจะข้ามการใส่ไอคอนให้ไม่พัง)
        $icoFile = (Get-ChildItem -Filter *.ico | Select-Object -First 1).Name
        
        if ($icoFile) {
            pyinstaller --onefile --name="Setup_Myapp.FilterCore" --icon="$icoFile" "$pyFile"
        } else {
            pyinstaller --onefile --name="Setup_Myapp.FilterCore" "$pyFile"
        }

    - name: Upload EXE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: My-Executable-Program
        path: dist/Setup_Myapp.FilterCore.exe
