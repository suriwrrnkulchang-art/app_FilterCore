name: Build Python to EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      py_file:
        description: 'ชื่อไฟล์ Python ที่ต้องการแปลง (เช่น Launcher_App1.py)'
        required: true
        default: 'Launcher_App1.py'
      exe_name:
        description: 'ชื่อไฟล์ EXE ปลายทางที่ต้องการ (เช่น Setup_Myapp)'
        required: true
        default: 'Launcher_App1'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Build EXE file
      shell: powershell
      run: |
        $pyInput = "${{ github.event.inputs.py_file }}"
        $exeOutput = "${{ github.event.inputs.exe_name }}"
        if (-not $pyInput) { $pyInput = "Launcher_App1.py" }
        if (-not $exeOutput) { $exeOutput = "Launcher_App1" }
        $targetPath = $pyInput
        if (-not (Test-Path $targetPath)) { $targetPath = (Get-ChildItem -Recurse -Filter $pyInput | Select-Object -First 1).FullName }
        if (-not $targetPath) { $targetPath = (Get-ChildItem -Recurse -Filter *.py | Select-Object -First 1).FullName }
        $icoFile = (Get-ChildItem -Recurse -Filter *.ico | Select-Object -First 1).FullName
        Write-Host "Target Python Path: $targetPath"
        Write-Host "Output EXE Name: $exeOutput"
        if ($icoFile) { pyinstaller --onefile --name="$exeOutput" --icon="$icoFile" "$targetPath" }
        if (-not $icoFile) { pyinstaller --onefile --name="$exeOutput" "$targetPath" }

    - name: Upload EXE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: My-Executable-Program
        path: dist/*.exe
