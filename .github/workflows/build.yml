name: Build Python to EXE

on:
  push:
    branches: [ main ] # หรือเปลี่ยนเป็นชื่อ branch ของคุณ เช่น master
  workflow_dispatch: # ทำให้เราสามารถกดสั่งรันเองได้ด้วยมือ

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Build EXE file
      run: |
        pyinstaller --onefile --name="Setup_Myapp.FilterCore" --icon="lol.ico" main.py

    - name: Upload EXE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: My-Executable-Program
        path: dist/Setup_Myapp.FilterCore.exe
