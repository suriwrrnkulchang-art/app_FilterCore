name: Build Python to EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Build EXE files
      shell: powershell
      run: |
        # ------------------------------------------------------------------
        # 🟢 กำหนดชื่อไฟล์ .py ให้ตรงกับที่อยู่บน GitHub ของคุณ
        # ------------------------------------------------------------------
        $pyFile1 = "Setup_Program-My-THAI.py"
        $pyFile2 = "uninstall_Program.py"
        
        # ค้นหาไฟล์ .ico อัตโนมัติในโฟลเดอร์ (ถ้าไม่มีจะข้ามให้เอง)
        $icoFile = (Get-ChildItem -Filter *.ico | Select-Object -First 1).Name
        
        # --- ตรวจสอบและสร้าง EXE ตัวที่ 1 ---
        if (Test-Path $pyFile1) {
            Write-Host "--- [1/2] Building EXE for $pyFile1 ---" -ForegroundColor Cyan
            if ($icoFile) {
                pyinstaller --onefile --name="Setup_Program-My-THAI" --icon="$icoFile" "$pyFile1"
            } else {
                pyinstaller --onefile --name="Setup_Program-My-THAI" "$pyFile1"
            }
        } else {
            Write-Host "ERROR: File '$pyFile1' not found! Please check your file name on GitHub." -ForegroundColor Red
            exit 1
        }

        # --- ตรวจสอบและสร้าง EXE ตัวที่ 2 ---
        if (Test-Path $pyFile2) {
            Write-Host "--- [2/2] Building EXE for $pyFile2 ---" -ForegroundColor Cyan
            if ($icoFile) {
                pyinstaller --onefile --name="uninstall_Program" --icon="$icoFile" "$pyFile2"
            } else {
                pyinstaller --onefile --name="uninstall_Program" "$pyFile2"
            }
        } else {
            Write-Host "ERROR: File '$pyFile2' not found! Please check your file name on GitHub." -ForegroundColor Red
            exit 1
        }

    - name: Upload EXE Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: My-Executable-Programs
        path: dist/*.exe
