name: Build Python to EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Build EXE files
      shell: powershell
      run: |
        # ------------------------------------------------------------------
        # 🟢 ต้องใส่นามสกุล .py ต่อท้ายชื่อไฟล์เสมอ และตรวจสอบชื่อให้ตรงกับใน GitHub
        # ------------------------------------------------------------------
        $pyFile1 = "Setup_Program-My-THAI.py"
        $pyFile2 = "uninstall_Program.py"
        
        # ค้นหาไฟล์ .ico ไฟล์แรกในโฟลเดอร์อัตโนมัติ (ถ้าไม่มีจะข้ามการใส่ไอคอน)
        $icoFile = (Get-ChildItem -Filter *.ico | Select-Object -First 1).Name
        
        # --- สร้าง EXE ตัวที่ 1 ---
        if (Test-Path $pyFile1) {
            print "--- กำลังสร้าง EXE ตัวที่ 1 ($pyFile1) ---"
            if ($icoFile) {
                pyinstaller --onefile --name="Setup_Program-My-THAI" --icon="$icoFile" "$pyFile1"
            } else {
                pyinstaller --onefile --name="Setup_Program-My-THAI" "$pyFile1"
            }
        } else {
            Write-Error "หาไฟล์ $pyFile1 ไม่เจอ! กรุณาตรวจสอบว่าอัปโหลดไฟล์นี้ขึ้น GitHub แล้วหรือยัง"
            exit 1
        }

        # --- สร้าง EXE ตัวที่ 2 ---
        if (Test-Path $pyFile2) {
            print "--- กำลังสร้าง EXE ตัวที่ 2 ($pyFile2) ---"
            if ($icoFile) {
                pyinstaller --onefile --name="uninstall_Program" --icon="$icoFile" "$pyFile2"
            } else {
                pyinstaller --onefile --name="uninstall_Program" "$pyFile2"
            }
        } else {
            Write-Error "หาไฟล์ $pyFile2 ไม่เจอ! กรุณาตรวจสอบว่าอัปโหลดไฟล์นี้ขึ้น GitHub แล้วหรือยัง"
            exit 1
        }

    - name: Upload EXE Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: My-Executable-Programs
        path: dist/*.exe
