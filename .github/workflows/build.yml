name: Build Python to EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      file1:
        description: 'First Python file name'
        required: true
        default: 'Setup_Program-My-THAI.py'
      file2:
        description: 'Second Python file name'
        required: true
        default: 'uninstall_Program.py'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Build EXE files
      shell: powershell
      run: |
        $pyFile1 = "${{ github.event.inputs.file1 }}"
        $pyFile2 = "${{ github.event.inputs.file2 }}"

        if (-not $pyFile1) { $pyFile1 = "Setup_Program-My-THAI.py" }
        if (-not $pyFile2) { $pyFile2 = "uninstall_Program.py" }

        $icoFile = (Get-ChildItem -Filter *.ico | Select-Object -First 1).Name

        # --- Process File 1 ---
        $path1 = $pyFile1
        if (-not (Test-Path $path1)) {
            $search1 = Get-ChildItem -Recurse -Filter $pyFile1 | Select-Object -First 1
            if ($search1) { $path1 = $search1.FullName }
        }

        if (Test-Path $path1) {
            Write-Host "Building EXE 1 from $path1"
            if ($icoFile) {
                pyinstaller --onefile --name="Setup_Program-My-THAI" --icon="$icoFile" "$path1"
            } else {
                pyinstaller --onefile --name="Setup_Program-My-THAI" "$path1"
            }
        } else {
            Write-Host "ERROR: $pyFile1 not found anywhere in repository."
            Get-ChildItem -Recurse -Filter *.py
            exit 1
        }

        # --- Process File 2 ---
        $path2 = $pyFile2
        if (-not (Test-Path $path2)) {
            $search2 = Get-ChildItem -Recurse -Filter $pyFile2 | Select-Object -First 1
            if ($search2) { $path2 = $search2.FullName }
        }

        if (Test-Path $path2) {
            Write-Host "Building EXE 2 from $path2"
            if ($icoFile) {
                pyinstaller --onefile --name="uninstall_Program" --icon="$icoFile" "$path2"
            } else {
                pyinstaller --onefile --name="uninstall_Program" "$path2"
            }
        } else {
            Write-Host "ERROR: $pyFile2 not found anywhere in repository."
            Get-ChildItem -Recurse -Filter *.py
            exit 1
        }

    - name: Upload EXE Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: My-Executable-Programs
        path: dist/*.exe
