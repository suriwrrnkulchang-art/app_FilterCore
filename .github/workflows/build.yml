name: Build Python to EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    # 🟢 เปิดฟีเจอร์ให้คุณสามารถกดเลือกและพิมพ์ชื่อไฟล์ที่ต้องการดึงมาทำ EXE บนหน้าเว็บ GitHub ได้ทันที
    inputs:
      file1:
        description: 'ชื่อไฟล์ Python ตัวที่ 1 (เช่น Setup_Program-My-THAI.py)'
        required: true
        default: 'Setup_Program-My-THAI.py'
      file2:
        description: 'ชื่อไฟล์ Python ตัวที่ 2 (เช่น uninstall_Program.py)'
        required: true
        default: 'uninstall_Program.py'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Build EXE files
      shell: powershell
      run: |
        # ดึงค่าชื่อไฟล์มาจากช่องกรอกบนหน้าเว็บ GitHub (หากรันแบบออโต้ตอน Push จะใช้ค่า Default ด้านบน)
        $pyFile1 = "${{ github.event.inputs.file1 }}"
        $pyFile2 = "${{ github.event.inputs.file2 }}"
        
        if (-not $pyFile1) { $pyFile1 = "Setup_Program-My-THAI.py" }
        if (-not $pyFile2) { $pyFile2 = "uninstall_Program.py" }

        # ค้นหาไฟล์ไอคอน .ico แรกในโปรเจกต์ (ถ้าไม่มีจะข้ามให้ไม่พัง)
        $icoFile = (Get-ChildItem -Filter *.ico | Select-Object -First 1).Name

        # ------------------------------------------------------------------
        # 🤖 ฟังก์ชันอัจฉริยะ ค้นหาไฟล์ทั่วทั้งโปรเจกต์อัตโนมัติและสั่ง Build
        # ------------------------------------------------------------------
        function Build-ExeApp ($targetFile, $exeName, $icon) {
            $actualPath = $targetFile
            
            # หากหาไม่เจอที่หน้าแรก (Root) จะสั่งให้ระบบค้นหาลึกเข้าไปในโฟลเดอร์ย่อยให้อัตโนมัติ
            if (-not (Test-Path $actualPath)) {
                $search = Get-ChildItem -Recurse -Filter $targetFile | Select-Object -First 1
                if ($search) { 
                    $actualPath = $search.FullName 
                }
            }

            # สั่ง Build เมื่อเจอไฟล์
            if (Test-Path $actualPath) {
                Write-Host "--- [FOUND] Building EXE for $exeName using ($actualPath) ---" -ForegroundColor Cyan
                if ($icon) {
                    pyinstaller --onefile --name="$exeName" --icon="$icon" "$actualPath"
                } else {
                    pyinstaller --onefile --name="$exeName" "$actualPath"
                }
            } else {
                # กรณีหาไม่เจอจริง ๆ ระบบจะลิสต์ไฟล์ .py ทั้งหมดใน GitHub มาให้คุณดูเพื่อตรวจคำผิด
                Write-Host "❌ ERROR: ไม่พบไฟล์ชื่อ '$targetFile' ใน Repository นี้!" -ForegroundColor Red
                Write-Host "นี่คือรายชื่อไฟล์ .py ทั้งหมดที่คุณอัปโหลดไว้บน GitHub ลองดูว่าพิมพ์ชื่อไหนผิดไปนะ:" -ForegroundColor Yellow
                Get-ChildItem -Recurse -Filter *.py | ForEach-Object { Write-Host " -> $($_.Name) (อยู่ในโฟลเดอร์: $($_.DirectoryName))" }
                exit 1
            }
        }

        # สั่งทำงานแอปที่ 1 และ แอปที่ 2
        Build-ExeApp -targetFile $pyFile1 -exeName "Setup_Program-My-THAI" -icon $icoFile
        Build-ExeApp -targetFile $pyFile2 -exeName "uninstall_Program" -icon $icoFile

    - name: Upload EXE Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: My-Executable-Programs
        path: dist/*.exe
